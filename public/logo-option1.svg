<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="50%" style="stop-color:#C4956A"/>
      <stop offset="100%" style="stop-color:#A67B5B"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C9A0"/>
      <stop offset="100%" style="stop-color:#C4956A"/>
    </linearGradient>
  </defs>
  
  <!-- Outer stone shape -->
  <ellipse cx="100" cy="100" rx="70" ry="80" fill="url(#g1)" opacity="0.9"/>
  
  <!-- Agate bands -->
  <ellipse cx="100" cy="100" rx="60" ry="70" fill="none" stroke="#B8875A" stroke-width="3" opacity="0.6"/>
  <ellipse cx="100" cy="100" rx="48" ry="58" fill="none" stroke="#A67B5B" stroke-width="4" opacity="0.5"/>
  <ellipse cx="100" cy="100" rx="36" ry="44" fill="none" stroke="#946B4A" stroke-width="3" opacity="0.5"/>
  <ellipse cx="100" cy="100" rx="24" ry="30" fill="none" stroke="#B8875A" stroke-width="3" opacity="0.6"/>
  
  <!-- Center geode/crystal -->
  <ellipse cx="100" cy="100" rx="14" ry="18" fill="#E8D5C4" opacity="0.4"/>
  <ellipse cx="100" cy="100" rx="6" ry="8" fill="#F5EDE4" opacity="0.5"/>
  
  <!-- Light reflection -->
  <ellipse cx="82" cy="75" rx="15" ry="10" fill="white" opacity="0.15" transform="rotate(-20,82,75)"/>
</svg>
