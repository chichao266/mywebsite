<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="40%" style="stop-color:#B8875A"/>
      <stop offset="100%" style="stop-color:#8B6B4A"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8C9A0"/>
      <stop offset="100%" style="stop-color:#C4956A"/>
    </linearGradient>
  </defs>
  
  <!-- Faceted gem / crystal shape -->
  <polygon points="100,20 170,70 160,140 100,180 40,140 30,70" fill="url(#g3)" opacity="0.8"/>
  
  <!-- Top facets -->
  <polygon points="100,20 170,70 100,100" fill="url(#g4)" opacity="0.3"/>
  <polygon points="100,20 30,70 100,100" fill="#E8C9A0" opacity="0.15"/>
  
  <!-- Bottom facets -->
  <polygon points="100,100 170,70 160,140" fill="#A67B5B" opacity="0.3"/>
  <polygon points="100,100 30,70 40,140" fill="#D4A574" opacity="0.2"/>
  <polygon points="100,100 160,140 100,180" fill="#887766" opacity="0.3"/>
  <polygon points="100,100 40,140 100,180" fill="#946B4A" opacity="0.25"/>
  
  <!-- Edge lines for definition -->
  <polygon points="100,20 170,70 160,140 100,180 40,140 30,70" fill="none" stroke="#7A5A4A" stroke-width="1.5"/>
  <line x1="100" y1="20" x2="100" y2="180" stroke="#7A5A4A" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="70" x2="170" y2="70" stroke="#7A5A4A" stroke-width="1" opacity="0.2"/>
  <line x1="40" y1="140" x2="160" y2="140" stroke="#7A5A4A" stroke-width="1" opacity="0.2"/>
  
  <!-- Sparkle -->
  <circle cx="82" cy="65" r="2" fill="white" opacity="0.6"/>
</svg>
