  <line x1="85" y1="80" x2="115" y2="80" stroke="#E8C9A0" stroke-width="2" opacity="0.4"/>
  <line x1="82" y1="100" x2="112" y2="100" stroke="#E8C9A0" stroke-width="2" opacity="0.3"/>
  
